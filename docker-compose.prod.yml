services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-your-org}/rankflow-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      RANKFLOW_HTTP_ADDR: ":8080"
      RANKFLOW_MYSQL_DSN: ${RANKFLOW_MYSQL_DSN:?RANKFLOW_MYSQL_DSN is required}
      RANKFLOW_REDIS_ADDR: ${RANKFLOW_REDIS_ADDR:?RANKFLOW_REDIS_ADDR is required}
      RANKFLOW_REDIS_PASSWORD: ${RANKFLOW_REDIS_PASSWORD:-}
      RANKFLOW_REDIS_DB: ${RANKFLOW_REDIS_DB:-0}
      RANKFLOW_PERSIST_WORKERS: ${RANKFLOW_PERSIST_WORKERS:-2}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/rankflow-api-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  frontend:
    image: ghcr.io/${GHCR_OWNER:-your-org}/rankflow-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
