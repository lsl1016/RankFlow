services:
  mysql:
    image: mysql:8.0
    container_name: rankflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rankflow
      MYSQL_USER: rankflow
      MYSQL_PASSWORD: rankflow
    ports:
      - "3306:3306"
    volumes:
      - rankflow_mysql:/var/lib/mysql
      - ./backend/deployments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prroot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rankflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rankflow_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rankflow_mysql:
  rankflow_redis:
